# Render Blueprint — déploie Bob.io en un clic.
# Sur render.com : New + → Blueprint → choisis ce dépôt.
services:
  - type: web
    name: bob-io
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # Version de Node compatible avec Next.js 16
      - key: NODE_VERSION
        value: "22"
      # yt-dlp est autonome : on saute la vérification de Python à l'install
      - key: YOUTUBE_DL_SKIP_PYTHON_CHECK
        value: "1"
      # Secrets — Render te demandera de les saisir (jamais dans le code)
      - key: GROQ_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Optionnel (détection premium via Claude) — laisse vide si non utilisé
      - key: ANTHROPIC_API_KEY
        sync: false
