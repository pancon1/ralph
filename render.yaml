# Render Blueprint — déploie Bob.io.
# render.com : New + → Blueprint → dépôt pancon1/ralph.
services:
  - type: web
    name: bob-io
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: YOUTUBE_DL_SKIP_PYTHON_CHECK
        value: "1"
      - key: GROQ_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
